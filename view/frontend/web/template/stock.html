<div class="featured-stock" aria-live="polite"
     data-bind="css: {'_updated': justUpdated}, event: {animationend: endPulse}">
    <!-- ko if: qty() === null && !unavailable() -->
    <span class="featured-stock-badge _loading" data-bind="i18n: 'Checking availability...'"></span>
    <!-- /ko -->

    <!-- ko if: qty() !== null && qty() > 0 -->
    <span class="featured-stock-badge _in-stock">
        <span class="featured-stock-qty" data-bind="text: qty"></span>
        <span data-bind="i18n: 'in stock'"></span>
    </span>
    <!-- /ko -->

    <!-- ko if: qty() === 0 -->
    <span class="featured-stock-badge _out-of-stock" data-bind="i18n: 'Out of stock'"></span>
    <!-- /ko -->
</div>
